<html>
<head>
  <title>Contact - Precision Tools Inc.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
  <div class="container">
    <a class="navbar-brand logo" href="index.html">Precision<span>Tools</span></a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#contactMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="contactMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html" target="_blank">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html" target="_blank">Products</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="page-hero">
  <div class="container text-center">
    <h1>Contact Us</h1>
    <p>Send your product enquiry or message using the form below.</p>
  </div>
</section>

<section class="contact-page">
  <div class="container">
    <div class="row g-4">

      <div class="col-md-5">
        <div class="contact-info">
          <h3>Get In Touch</h3>
          <p><b>Address:</b> Pune, Maharashtra</p>
          <p><b>Phone:</b> 9876543210</p>
          <p><b>Email:</b> info@precisiontools.com</p>
          <p><b>Working Hours:</b> Monday to Saturday, 9 AM to 6 PM</p>
        </div>
      </div>

      <div class="col-md-7">
        <form onsubmit="return validateForm()" class="contact-form">
          <input type="text" id="name" placeholder="Enter your name">
          <input type="email" id="email" placeholder="Enter your email">
          <input type="text" id="phone" placeholder="Enter phone number">
          <textarea id="message" placeholder="Write your message"></textarea>

          <button type="submit">Send Message</button>
          <p id="error"></p>
        </form>
      </div>

    </div>
  </div>
</section>

<footer>
  <p>© 2025 Precision Tools Inc. | Contact Page</p>
</footer>

<script>
function validateForm() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let message = document.getElementById("message").value;
  let error = document.getElementById("error");

  if (name == "" || email == "" || phone == "" || message == "") {
    error.style.color = "red";
    error.innerHTML = "Please fill all fields.";
    return false;
  }

  if (phone.length != 10) {
    error.style.color = "red";
    error.innerHTML = "Phone number must be 10 digits.";
    return false;
  }

  error.style.color = "green";
  error.innerHTML = "Message submitted successfully!";
  return false;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
